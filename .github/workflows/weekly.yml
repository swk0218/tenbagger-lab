name: Weekly Run (Mon 09:00 KST)

on:
  schedule:
    - cron: "0 0 * * 1"   # Mon 00:00 UTC = Mon 09:00 KST
  workflow_dispatch:       # 필요하면 수동 실행 버튼도 생김

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run something
        run: |
          echo "Hello from weekly run"
          date -u
